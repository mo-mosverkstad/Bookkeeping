<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="native-math.css" />
    <script type="module" src="/src/main.ts"></script>
    <title>Bookkeeping Webapp</title>
  </head>
  <body>
    <div id="app">
      <h2>Expression Renderer</h2>
      <input
        type="text"
        id="input"
        placeholder="Write your BobaMath plaintext input"
        style="width: 400px"
      />
      <button id="render">Render</button>
      <div id="result"></div>
      <pre class="error-message" id="error-message"></pre>

      <hr />

      <h2>Knowledge Table</h2>
      <label for="file-input">Load CSV file(s):</label>
      <input type="file" id="file-input" accept=".csv" multiple />

      <div id="cell-edit-bar" class="cell-edit-bar" hidden>
        <span class="cell-edit-bar-label">Preview:</span>
        <div id="cell-edit-preview" class="cell-edit-bar-preview"></div>
      </div>

      <div id="table-container" class="table-drop-zone">
        Drop a .csv file here or use the file picker above
      </div>
    </div>
  </body>
</html>
