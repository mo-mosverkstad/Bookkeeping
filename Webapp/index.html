<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="native-math.css" />
    <script type="module" src="/src/main.ts"></script>
    <title>Bookkeeping</title>
  </head>
  <body>

    <!-- 1. Menu bar: file operations -->
    <div id="menu-bar">
      <span class="app-title">Bookkeeping</span>
      <label id="btn-open-label" class="menu-btn" title="Open files">
        Open
        <input type="file" id="file-input" accept=".csv,.json" multiple hidden />
      </label>
      <div id="session-banner" class="session-banner" hidden></div>
    </div>

    <!-- 2. Toolbar: dynamic (view-specific) | static (common) | filter | search -->
    <div id="toolbar">
      <div id="dynamic-toolbar" class="toolbar-group"></div>
      <div class="toolbar-sep"></div>
      <div id="static-toolbar" class="toolbar-group">
        <button id="btn-save" title="Save all modified files (Ctrl+S)">Save</button>
        <button id="btn-export-csv" title="Export active table as CSV">Export</button>
        <button id="btn-toggle-sidebar" title="Toggle source editor sidebar">&#9664; Editor</button>
        <button id="btn-toggle-nav" title="Toggle navigation tree">&#9776; Nav</button>
      </div>
      <div class="toolbar-sep"></div>
      <div id="filter-toolbar" class="toolbar-group">
        <div id="graph-filter-container"></div>
      </div>
      <div class="toolbar-sep"></div>
      <div id="search-toolbar" class="toolbar-group">
        <div id="search-container"></div>
      </div>
    </div>

    <!-- 3. Tab bar: one tab per loaded table or graph -->
    <div id="tab-bar">
      <div id="tab-strip"></div>
    </div>

    <!-- 4. Content area: nav-tree + workspace + sidebar (flex row) -->
    <div id="content-area">

      <!-- 4a. Navigation tree: hierarchical structure of loaded content -->
      <div id="nav-tree-panel">
        <div id="nav-tree-header">Contents</div>
        <div id="nav-tree"></div>
      </div>

      <!-- 4b. Workspace: scrollable table/diagram area -->
      <div id="workspace">
        <div id="table-container" class="drop-hint">
          Drop .csv or .graph.json files here or use Open above
        </div>
      </div>

      <!-- 4c. Source editor sidebar -->
      <div id="sidebar">
        <div id="source-editor-container"></div>
        <pre id="error-message" class="error-message"></pre>
      </div>

    </div>

    <!-- 5. Status bar -->
    <div id="status-bar">
      <span id="status-text"></span>
    </div>

  </body>
</html>
