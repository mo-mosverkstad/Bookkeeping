<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="native-math.css" />
    <script type="module" src="/src/main.ts"></script>
    <title>Bookkeeping</title>
  </head>
  <body>

    <!-- 1. Menu bar: file operations -->
    <div id="menu-bar">
      <span class="app-title">Bookkeeping</span>
      <label class="menu-btn" title="Open CSV file(s)">
        📂 Open
        <input type="file" id="file-input" accept=".csv" multiple hidden />
      </label>
      <div id="session-banner" class="session-banner" hidden></div>
    </div>

    <!-- 2. Formula bar: source editor for the active cell -->
    <div id="formula-bar">
      <span class="formula-label">fx</span>
      <textarea id="cell-source-input" rows="1" placeholder="Select a cell to edit…" spellcheck="false"></textarea>
      <pre class="error-message" id="error-message"></pre>
    </div>

    <!-- 3. Toolbar: row actions, filter, search -->
    <div id="toolbar">
      <div id="row-toolbar" class="toolbar-group">
        <button id="btn-add-row" title="Add row">+ Row</button>
        <button id="btn-export-csv" title="Export active table as CSV">⬇ Export</button>
      </div>
      <div class="toolbar-sep"></div>
      <div id="filter-toolbar" class="toolbar-group">
        <div id="graph-filter-container"></div>
      </div>
      <div class="toolbar-sep"></div>
      <div id="search-toolbar" class="toolbar-group">
        <div id="search-container"></div>
      </div>
    </div>

    <!-- 4. Tab bar: one tab per loaded table -->
    <div id="tab-bar">
      <div id="tab-strip"></div>
    </div>

    <!-- 5. Workspace: only this scrolls -->
    <div id="workspace">
      <div id="table-container" class="drop-hint">
        Drop .csv files here or use Open above
      </div>
    </div>

    <!-- 6. Status bar -->
    <div id="status-bar">
      <span id="status-text"></span>
    </div>

  </body>
</html>
